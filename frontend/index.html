<!DOCTYPE html>
<html>
<head>
  <title>Workhorse IDE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toolbar">
  <button id="run-btn">⚡ Run</button>
  <button id="format-btn">✨ Format Code</button>

  <select id="language-select">
    <option value="javascript">JavaScript</option>
    <option value="html">HTML</option>
    <option value="css">CSS</option>
    <option value="python">Python</option>
  </select>

  <button id="clear-console-btn">🗑️ Clear Console</button>

  <button id="analyze-btn" title="Analyze code for issues">🔍 Analyze</button>
  <button id="refactor-btn" title="Refactor selected code">♻️ Refactor</button>
  <button id="docs-btn" title="Generate documentation">📚 Generate Docs</button>
  <button id="ai-health-btn" title="Check AI backend status">🤖 AI Status</button>

  <select id="console-theme">
    <option value="dark">Dark</option>
    <option value="neon">Neon</option>
    <option value="hacker">Hacker Green</option>
  </select>
</div>

<div id="workspace-layout">
  <div id="workspace-main">
    <div id="workspace-top">
      <aside id="file-explorer-panel">
        <div id="file-explorer-header">
          <span>Files</span>
          <button id="explorer-add-directory-btn" class="explorer-header-btn" type="button">Add Directory</button>
        </div>
        <div id="file-explorer-tree"></div>
      </aside>

      <div class="panel-resizer vertical" id="left-panel-resizer" aria-label="Resize explorer"></div>

      <div id="sandbox-container">
        <div id="center-panel-header">
          <div id="center-panel-title-wrap">
            <span id="center-panel-title">Editor</span>
            <span id="center-panel-subtitle">Open files here or turn on Auto Render for HTML preview.</span>
          </div>
          <div id="center-panel-actions">
            <label id="auto-render-toggle-row" for="auto-render-toggle">
              <input id="auto-render-toggle" type="checkbox" /> Auto Render
            </label>
            <label id="split-preview-toggle-row" for="split-preview-toggle">
              <input id="split-preview-toggle" type="checkbox" disabled /> Split View
            </label>
            <span id="ai-status-badge" class="ai-status unknown">Unknown</span>
          </div>
        </div>

        <div id="center-panel-body">
          <div id="editor-host" class="center-surface center-surface--active">
            <div id="editor"></div>
          </div>
          <div id="render-host" class="center-surface" hidden>
            <div id="render-empty-state">Auto render is enabled. Open or edit an HTML file to preview it here.</div>
            <iframe id="render-frame" title="Rendered preview"></iframe>
          </div>
          <pre id="ai-panel-output" hidden>No AI action yet.</pre>
        </div>
      </div>
    </div>

    <div id="composer-section">
      <div id="context-chips-row" class="context-chips-row">
        <span class="chips-label">Context:</span>
        <div id="context-chips-container" class="chips-container"></div>
        <button id="context-add-btn" class="context-add-btn" type="button" title="Add context (Ctrl+K)">+ Add</button>
        <select id="context-undo-select" class="context-inline-select">
          <option value="">Undo history</option>
        </select>
        <button id="context-undo-btn" class="context-inline-btn" type="button" disabled>Undo</button>
        <button id="context-undo-refresh-btn" class="context-inline-btn" type="button">Refresh</button>
      </div>

      <div id="composer-container" class="composer-container">
        <textarea
          id="composer-input"
          class="composer-input"
          placeholder="What do you want to do? Describe code changes, refactors, or questions."
          aria-label="Composer input"
          rows="1"
        ></textarea>
        <div class="composer-hint">Shift+Enter for newline, Enter to send</div>
      </div>

      <div id="mode-buttons-row" class="mode-buttons-row">
        <button id="mode-consult-btn" class="mode-button mode-button--active" type="button" title="Ask clarifying questions (Ctrl+Shift+C)">💬 Consult</button>
        <button id="mode-blueprint-btn" class="mode-button" type="button" title="Plan operations (Ctrl+Shift+B)">📋 Blueprint</button>
        <button id="mode-forge-btn" class="mode-button" type="button" title="Execute staged operations (Ctrl+Shift+F)" disabled>⚒️ Forge</button>
        <button id="mode-refresh-btn" class="mode-button" type="button" title="Rerun last operation">🔄 Refresh</button>
        <button id="composer-send-btn" class="mode-button mode-button--send" type="button" title="Send (Enter)" disabled>→ Send</button>
      </div>
    </div>

    <div class="panel-resizer horizontal" id="console-resizer" aria-label="Resize console"></div>
    <div id="console-container">
      <div id="console"></div>
    </div>
  </div>
</div>

<div id="context-picker-modal" class="modal" hidden>
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3>Add Context</h3>
      <button class="modal-close-btn" id="context-picker-close-btn" type="button" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <input id="context-picker-search" type="text" class="context-picker-search" placeholder="Search files..." aria-label="Search context" />
      <div class="context-picker-sections">
        <section class="context-picker-section">
          <h4>Recent Files</h4>
          <div id="context-picker-recent" class="context-picker-list"></div>
        </section>
        <section class="context-picker-section">
          <h4>Open Tabs</h4>
          <div id="context-picker-tabs" class="context-picker-list"></div>
        </section>
        <section class="context-picker-section">
          <h4>Terminal Output</h4>
          <div id="context-picker-terminal" class="context-picker-list"></div>
        </section>
        <section class="context-picker-section">
          <h4>Workspace Files</h4>
          <div id="context-picker-workspace" class="context-picker-list"></div>
        </section>
      </div>
    </div>
    <div class="modal-footer">
      <button id="context-picker-cancel-btn" type="button">Cancel</button>
      <button id="context-picker-add-btn" type="button" disabled>Add Selected</button>
    </div>
  </div>
</div>

<script src="vendor/monaco/vs/loader.js"></script>
<script src="aiService.js"></script>
<script src="consoleModule.js"></script>
<script src="editorModule.js"></script>
<script src="executionModule.js"></script>
<script src="explorerModule.js"></script>
<script src="panelResizerModule.js"></script>
<script src="aiFeaturesModule.js"></script>
<script src="contextModule.js"></script>
<script src="composerModule.js"></script>
<script src="contextPickerModal.js"></script>
<script src="main.js"></script>

</body>
</html>
